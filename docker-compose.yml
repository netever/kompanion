version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kompanion_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onlinebankdb
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./init_data_vault.sql:/docker-entrypoint-initdb.d/02-init_data_vault.sql
      - ./insert_data.sql:/docker-entrypoint-initdb.d/03-insert_data.sql
      - ./load_data_vault.sql:/docker-entrypoint-initdb.d/04-load_data_vault.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bank_network

volumes:
  postgres_data:
    driver: local

networks:
  bank_network:
    driver: bridge
